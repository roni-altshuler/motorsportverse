name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "registry/**"
      - "projects/f2-predictions/**"
      - "projects/f1-predictions/website/**"
      - "packages/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:
  # Invoked by f1-update-predictions.yml after the race-weekend cron commits new
  # F1 data, so the unified Pages site rebuilds (bot commits don't auto-trigger
  # the push event above — GitHub's recursion guard).
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# GitHub Pages serves one site per repo, so both the ecosystem hub and the
# per-sport project sites ship in a single artifact: the hub at /<repo>/ and
# each project under /<repo>/projects/<slug>/. Adding a sport = add a block here.
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Generate the F2 dataset the F2 site reads at build time ---
      - name: Install Python packages
        run: pip install -e packages/motorsport-core -e packages/motorsport-data -e projects/f2-predictions xgboost
      - name: Generate F2 data
        run: |
          python -m f2_predictions.export
          python -m f2_predictions.forward_eval --season 2026 --allow-empty
          python -m f2_predictions.drift_report --season 2026 --allow-empty
          python -m f2_predictions.promotion_decision --season 2026 --allow-empty

      # --- Ecosystem hub (root) ---
      - name: Build ecosystem website
        working-directory: website
        run: npm install && npm run build # prebuild regenerates registry.json
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}

      # --- RaceIQ F2 project site (sub-path) ---
      - name: Build F2 website
        working-directory: projects/f2-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/f2

      # --- RaceIQ F1 flagship site (sub-path). The F1 site reads the JSON the
      #     race-weekend cron (f1-update-predictions.yml) commits, so no data
      #     generation step is needed here — only a static build. ---
      - name: Build F1 website
        working-directory: projects/f1-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/f1

      # --- Combine into one Pages artifact ---
      - name: Assemble site tree
        run: |
          mkdir -p website/out/projects/f2 website/out/projects/f1
          cp -r projects/f2-predictions/website/out/. website/out/projects/f2/
          cp -r projects/f1-predictions/website/out/. website/out/projects/f1/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
