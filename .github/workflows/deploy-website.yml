name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "registry/**"
      - "projects/f2-predictions/**"
      - "projects/f3-predictions/**"
      - "projects/formula-e-predictions/**"
      - "projects/nascar-predictions/**"
      - "projects/indycar-predictions/**"
      - "projects/f1-predictions/website/**"
      - "packages/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:
  # Invoked by f1-update-predictions.yml after the race-weekend cron commits new
  # F1 data, so the unified Pages site rebuilds (bot commits don't auto-trigger
  # the push event above — GitHub's recursion guard).
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# GitHub Pages serves one site per repo, so both the ecosystem hub and the
# per-sport project sites ship in a single artifact: the hub at /<repo>/ and
# each project under /<repo>/projects/<slug>/. Adding a sport = add a block here.
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Always build the current tip of the deploy branch. When this workflow
          # is invoked via workflow_call from f1/f2-update-predictions.yml, the
          # predict job has ALREADY pushed the freshly-ingested round data to
          # main — but checkout's default ref is the run's *triggering* SHA (the
          # pre-commit HEAD), so without this the new results are silently left
          # out of the artifact and the site stays a race behind (it only catches
          # up when some later push happens to re-trigger a deploy). Pinning the
          # branch tip makes the just-pushed results go live in the same run.
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Generate the F2/F3 datasets their sites read at build time ---
      - name: Install Python packages
        run: |
          pip install -e packages/motorsport-core -e packages/motorsport-data -e projects/f2-predictions -e projects/f3-predictions xgboost
          pip install -e projects/formula-e-predictions --no-deps
          pip install -e projects/nascar-predictions --no-deps
          pip install -e projects/indycar-predictions --no-deps
          pip install requests numpy matplotlib
      - name: Generate F2 data
        run: |
          python -m f2_predictions.export
          python -m f2_predictions.forward_eval --season 2026 --allow-empty
          python -m f2_predictions.drift_report --season 2026 --allow-empty
          python -m f2_predictions.promotion_decision --season 2026 --allow-empty
      - name: Generate F3 data
        run: |
          python -m f3_predictions.export
          python -m f3_predictions.forward_eval --season 2026 --allow-empty
          python -m f3_predictions.drift_report --season 2026 --allow-empty
          python -m f3_predictions.promotion_decision --season 2026 --allow-empty
      - name: Generate Formula E data
        run: |
          python -m formula_e_predictions.export
          python -m formula_e_predictions.forward_eval --season 2026 --allow-empty
          python -m formula_e_predictions.drift_report --season 2026 --allow-empty
          python -m formula_e_predictions.promotion_decision --season 2026 --allow-empty
      - name: Generate NASCAR data
        run: |
          python -m nascar_predictions.export
          python -m nascar_predictions.forward_eval --season 2026 --allow-empty
          python -m nascar_predictions.drift_report --season 2026 --allow-empty
          python -m nascar_predictions.promotion_decision --season 2026 --allow-empty
      - name: Generate IndyCar data
        run: |
          python -m indycar_predictions.export
          python -m indycar_predictions.forward_eval --season 2026 --allow-empty
          python -m indycar_predictions.drift_report --season 2026 --allow-empty
          python -m indycar_predictions.promotion_decision --season 2026 --allow-empty

      # --- Ecosystem hub (root) ---
      - name: Build ecosystem website
        working-directory: website
        run: npm install && npm run build # prebuild regenerates registry.json
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}

      # --- RaceIQ F2 project site (sub-path) ---
      - name: Build F2 website
        working-directory: projects/f2-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/f2

      # --- RaceIQ F3 project site (sub-path) ---
      - name: Build F3 website
        working-directory: projects/f3-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/f3

      # --- RaceIQ Formula E project site (sub-path) ---
      - name: Build Formula E website
        working-directory: projects/formula-e-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/formula-e

      # --- RaceIQ NASCAR project site (sub-path) ---
      - name: Build NASCAR website
        working-directory: projects/nascar-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/nascar

      # --- RaceIQ IndyCar project site (sub-path) ---
      - name: Build IndyCar website
        working-directory: projects/indycar-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/indycar

      # --- RaceIQ F1 flagship site (sub-path). The F1 site reads the JSON the
      #     race-weekend cron (f1-update-predictions.yml) commits, so no data
      #     generation step is needed here — only a static build. ---
      - name: Build F1 website
        working-directory: projects/f1-predictions/website
        run: npm install && npm run build
        env:
          PAGES_BASE_PATH: ${{ env.BASE }}/projects/f1

      # --- Combine into one Pages artifact ---
      - name: Assemble site tree
        run: |
          mkdir -p website/out/projects/f2 website/out/projects/f3 website/out/projects/f1 \
                   website/out/projects/formula-e website/out/projects/nascar website/out/projects/indycar
          cp -r projects/f2-predictions/website/out/. website/out/projects/f2/
          cp -r projects/f3-predictions/website/out/. website/out/projects/f3/
          cp -r projects/f1-predictions/website/out/. website/out/projects/f1/
          cp -r projects/formula-e-predictions/website/out/. website/out/projects/formula-e/
          cp -r projects/nascar-predictions/website/out/. website/out/projects/nascar/
          cp -r projects/indycar-predictions/website/out/. website/out/projects/indycar/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages intermittently fails with "Deployment failed, try again later"
      # during syncing_files (seen 2026-07-05 and 2026-07-06). Cron-triggered
      # deploys run unattended, so retry twice before failing the run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
