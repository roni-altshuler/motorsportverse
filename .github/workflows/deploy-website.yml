name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "registry/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      # prebuild regenerates public/data/registry.json from registry/projects/*
      - run: npm run build
        env:
          # Project page served at https://<owner>.github.io/<repo>/ — assets
          # must be prefixed with /<repo>. (For an org user-page repo named
          # <org>.github.io, set this to "" instead.)
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
