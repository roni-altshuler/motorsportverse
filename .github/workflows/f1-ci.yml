name: F1 CI

# F1 flagship lives at projects/f1-predictions/. GitHub only runs workflows from
# the repo root, so this relocated CI runs the F1 lint + test suite from inside
# that subdirectory and only fires when F1 files change.

on:
  push:
    branches: [main]
    paths:
      - "projects/f1-predictions/**"
      - ".github/workflows/f1-ci.yml"
  pull_request:
    paths:
      - "projects/f1-predictions/**"
      - ".github/workflows/f1-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/f1-predictions
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: projects/f1-predictions/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest tests/ -v --tb=short
