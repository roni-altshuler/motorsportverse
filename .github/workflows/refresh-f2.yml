name: Refresh F2 snapshot

# Scheduled real-data pipeline for RaceIQ F2: scrape the official fiaformula2.com
# results into the committed, reviewable snapshot (projects/f2-predictions/data/
# official_2026.json), regenerate the site dataset + forward-eval/drift/promotion
# artifacts, and commit only if something changed. This is the "automated update
# pipeline" half of F2's `production` maturity (the other half — a deployed site —
# is handled by deploy-website.yml). The live scrape is isolated here; every other
# build reads the committed snapshot, so a flaky/restructured source can never ship
# wrong data — it just means this run no-ops until the scraper is fixed.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC, after a race weekend
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-f2
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -e packages/motorsport-core -e packages/motorsport-data -e projects/f2-predictions xgboost

      - name: Refresh the official snapshot from fiaformula2.com
        run: python -m f2_predictions.refresh --season 2026

      - name: Regenerate site dataset + continuous-learning artifacts
        run: |
          python -m f2_predictions.export
          python -m f2_predictions.forward_eval --season 2026 --allow-empty
          python -m f2_predictions.drift_report --season 2026 --allow-empty
          python -m f2_predictions.promotion_decision --season 2026 --allow-empty

      - name: Commit refreshed data if changed
        run: |
          git config user.name "motorsportverse-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/f2-predictions/data/official_2026.json \
                  projects/f2-predictions/website/public/data
          if git diff --cached --quiet; then
            echo "No data changes — snapshot already current."
          else
            git commit -m "chore(f2): scheduled refresh of the official 2026 snapshot + site data"
            git push
          fi
