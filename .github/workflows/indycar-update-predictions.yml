name: IndyCar — Update Race Predictions

# IndyCar race-weekend automation. Snapshot-primary: the committed
# data/history_2026.json is the source of truth; the live refresh scrapes only
# behind strict clean-parse validation (roster whitelist, car counts, event
# identity, publication grace window) — any validation failure means no
# snapshot write, and the site keeps serving last-good data.
#
# Races run Sundays (some Saturdays), season March–September, with the Indy 500
# in late May. Results publish to the source with some lag, so the gate sweeps
# for stranded rounds on the weekday safety nets.

on:
  schedule:
    # ── Saturday: occasional race days + qualifying. ──
    - cron: "*/20 16-23 * * 6"
    # ── Sunday: the main race window (US afternoon/evening) + spillover. ──
    - cron: "*/20 16-23 * * 0"
    - cron: "*/20 0-3 * * 1"
    # ── Weekday safety nets: source publication can lag the race by days. ──
    - cron: "0 6,12,18 * * 1"  # Monday
    - cron: "0 9,21 * * 2"     # Tuesday
    - cron: "0 12 * * 3,4"     # Wednesday/Thursday once each
  workflow_dispatch:
    inputs:
      round:
        description: "Round number, or 'next' for the upcoming round"
        required: true
        default: "next"
      force:
        description: "Run the heavy pipeline even if the freshness gate says no work"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: indycar-update-predictions
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python packages
        run: |
          pip install -e packages/motorsport-core -e packages/motorsport-data xgboost
          pip install -e projects/indycar-predictions --no-deps
          pip install requests numpy matplotlib

      - name: Determine round
        id: config
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.round }}" = "next" ]; then
            ROUND=$(python -m indycar_predictions.race_weekend --detect-round)
          else
            ROUND="${{ github.event.inputs.round }}"
          fi
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "Active IndyCar round: $ROUND"

      - name: Bootstrap next season calendar (auto)
        run: |
          python -m indycar_predictions.bootstrap_next_season || echo "⚠️  bootstrap skipped (non-fatal)"

      - name: Season rollover (auto)
        run: |
          python -m indycar_predictions.season_rollover --auto || echo "⚠️  rollover skipped (non-fatal)"

      - name: Freshness gate — should this poll do real work?
        id: check
        run: |
          ROUND="${{ steps.config.outputs.round }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "${{ github.event_name }}" != "schedule" ] && [ "$FORCE" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual force-run — skipping the freshness gate."
            exit 0
          fi

          IS_RACEDAY=$(python -m indycar_predictions.race_weekend --round "$ROUND" --is-race-weekend)
          PENDING=$(python -m indycar_predictions.race_weekend --round "$ROUND" --check-work-pending | tail -1)
          PHASE=$(python -m indycar_predictions.race_weekend --round "$ROUND" --phase | tail -1)
          echo "   Work pending for round $ROUND: $PENDING (phase: $PHASE, race day: $IS_RACEDAY)"
          SHOULD_RUN=false
          if [ "$PENDING" = "yes" ]; then SHOULD_RUN=true; fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          if [ "$SHOULD_RUN" != "true" ]; then
            echo "⏭️  Nothing new to publish — skipping the heavy pipeline this poll."
          fi

      - name: Refresh the snapshot (live scrape behind clean-parse gates)
        if: steps.check.outputs.should_run == 'true'
        env:
          INDYCAR_USE_LIVE_RESULTS: "1"
        run: python -m indycar_predictions.refresh --season 2026

      - name: Regenerate site dataset + continuous-learning artifacts
        if: steps.check.outputs.should_run == 'true'
        run: |
          python -m indycar_predictions.export
          python -m indycar_predictions.forward_eval --season 2026 --allow-empty
          python -m indycar_predictions.drift_report --season 2026 --allow-empty
          python -m indycar_predictions.promotion_decision --season 2026 --allow-empty

      - name: Validate generated outputs
        if: steps.check.outputs.should_run == 'true'
        run: |
          cd projects/indycar-predictions
          PYTHONPATH=src python -m pytest tests/test_website_data_schema.py -q

      - name: Commit refreshed data if changed
        id: commit
        if: steps.check.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "committed=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f projects/indycar-predictions/data/history_*.json \
                     projects/indycar-predictions/website/public/data
          git add projects/indycar-predictions/data/announced_seasons \
                  projects/indycar-predictions/data/active_season.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes — snapshot already current."
            exit 0
          fi
          ROUND="${{ steps.config.outputs.round }}"
          git commit -m "[indycar] Update round $ROUND ($(date -u +%Y-%m-%d))"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          bash .github/scripts/safe_push.sh
          echo "committed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: predict
    if: needs.predict.outputs.committed == 'true'
    uses: ./.github/workflows/deploy-website.yml
    permissions:
      contents: read
      pages: write
      id-token: write
