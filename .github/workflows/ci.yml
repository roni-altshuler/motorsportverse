name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Packages + registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/motorsport-core[dev]"
          pip install -e "packages/motorsport-data[dev]"
          pip install -e projects/f2-predictions --no-deps
          pip install -e projects/f3-predictions --no-deps
          # xgboost powers the full GBR+XGB skill ensemble; sklearn comes via core.
          # Without it the model degrades to a GBR-only signal, so this is for parity.
          pip install xgboost

      - name: Lint
        run: |
          pip install ruff
          # projects/f1-predictions has its own ruff config + dedicated f1-ci.yml,
          # so it is intentionally excluded here.
          ruff check packages/motorsport-core packages/motorsport-data scripts \
            $(ls -d projects/*/ | grep -v f1-predictions)

      - name: Test motorsport-core
        run: pytest packages/motorsport-core -q

      - name: Test motorsport-data
        run: pytest packages/motorsport-data -q

      - name: Test f2-predictions
        run: pytest projects/f2-predictions -q

      - name: Test f3-predictions
        run: pytest projects/f3-predictions -q

      - name: Test scaffolded series projects
        run: |
          for p in indycar wec motogp formula-e nascar wrc imsa lemans; do
            (cd "projects/${p}-predictions" && PYTHONPATH=src pytest -q)
          done

      - name: Validate registry
        run: python scripts/build_registry.py

  website:
    name: Website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
