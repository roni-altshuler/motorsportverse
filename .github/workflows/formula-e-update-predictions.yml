name: Formula E — Update Race Predictions

# Formula E race-weekend automation, same freshness-gated pattern as the F2/F3
# crons. E-Prix run as one-day events (practice + qualifying + race packed into
# a single day), mostly Saturdays with doubleheaders adding a Sunday race, and
# the season spans December–August.
#
# A cheap freshness gate (race_weekend.py) runs first on every poll: pure
# wall-clock off race days, one live API probe on race days. Only when the
# Formula E API has genuinely new data the committed snapshot lacks — fresh
# qualifying (→ a post-quali forecast) or an official result — does the heavy
# refresh → export → eval → deploy pipeline run.

on:
  schedule:
    # ── Saturday: the standard E-Prix day (qualifying ~2-4h before the race).
    #    Windows span Asia through Americas race times. ──
    - cron: "*/15 1-23 * * 6"
    # ── Sunday: doubleheader second races. ──
    - cron: "*/15 1-23 * * 0"
    # ── Post-weekend safety net for late-publishing results. ──
    - cron: "0 */4 * * 1"   # Monday every 4 hours
    - cron: "0 8,20 * * 2"  # Tuesday twice
  workflow_dispatch:
    inputs:
      round:
        description: "Round number, or 'next' for the upcoming round"
        required: true
        default: "next"
      force:
        description: "Run the heavy pipeline even if the freshness gate says no work"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: formula-e-update-predictions
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python packages
        run: |
          pip install -e packages/motorsport-core -e packages/motorsport-data xgboost
          pip install -e projects/formula-e-predictions --no-deps
          pip install requests numpy matplotlib pytest

      - name: Determine round
        id: config
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.round }}" = "next" ]; then
            ROUND=$(python -m formula_e_predictions.race_weekend --detect-round)
          else
            ROUND="${{ github.event.inputs.round }}"
          fi
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "Active Formula E round: $ROUND"

      - name: Bootstrap next season calendar (auto)
        run: |
          # Placeholder carry-forward until the real calendar is installed with
          # --from-file; idempotent and dormant until rollover --auto starts it.
          python -m formula_e_predictions.bootstrap_next_season || echo "⚠️  bootstrap skipped (non-fatal)"

      - name: Season rollover (auto)
        run: |
          # No-op until the active season completes AND the announced next
          # season has begun; then archive + start.
          python -m formula_e_predictions.season_rollover --auto || echo "⚠️  rollover skipped (non-fatal)"

      - name: Freshness gate — should this poll do real work?
        id: check
        run: |
          ROUND="${{ steps.config.outputs.round }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "${{ github.event_name }}" != "schedule" ] && [ "$FORCE" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual force-run — skipping the freshness gate."
            exit 0
          fi

          IS_RACEDAY=$(python -m formula_e_predictions.race_weekend --round "$ROUND" --is-race-weekend)
          # The gate also sweeps for a PRIOR round stranded without its official
          # result, so late-publishing results heal on the Mon/Tue safety nets.
          PENDING=$(python -m formula_e_predictions.race_weekend --round "$ROUND" --check-work-pending | tail -1)
          PHASE=$(python -m formula_e_predictions.race_weekend --round "$ROUND" --phase | tail -1)
          echo "   Work pending for round $ROUND: $PENDING (phase: $PHASE, race day: $IS_RACEDAY)"
          SHOULD_RUN=false
          if [ "$PENDING" = "yes" ]; then SHOULD_RUN=true; fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          if [ "$SHOULD_RUN" != "true" ]; then
            echo "⏭️  Nothing new to publish — skipping the heavy pipeline this poll."
          fi

      - name: Refresh the real snapshot from the Formula E API (live)
        if: steps.check.outputs.should_run == 'true'
        env:
          # Live pull: newly-published qualifying + results land in the committed
          # snapshot. Every downstream build reads the snapshot offline, so a
          # flaky source can never ship wrong data — it just no-ops the run.
          FE_USE_LIVE_RESULTS: "1"
        run: python -m formula_e_predictions.refresh --season 2026

      - name: Regenerate site dataset + continuous-learning artifacts
        if: steps.check.outputs.should_run == 'true'
        run: |
          python -m formula_e_predictions.export
          python -m formula_e_predictions.forward_eval --season 2026 --allow-empty
          python -m formula_e_predictions.drift_report --season 2026 --allow-empty
          python -m formula_e_predictions.promotion_decision --season 2026 --allow-empty

      - name: Validate generated outputs
        if: steps.check.outputs.should_run == 'true'
        run: |
          # Schema + sanity gate before commit, so degenerate output never
          # reaches GitHub Pages. Same gate as the F2/F3 crons.
          cd projects/formula-e-predictions
          PYTHONPATH=src python -m pytest tests/test_website_data_schema.py -q

      - name: Commit refreshed data if changed
        id: commit
        if: steps.check.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "committed=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f projects/formula-e-predictions/data/official_*.json \
                     projects/formula-e-predictions/website/public/data
          # Multi-season state: pre-staged calendars + the active-season marker.
          git add projects/formula-e-predictions/data/announced_seasons \
                  projects/formula-e-predictions/data/active_season.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes — snapshot already current."
            exit 0
          fi
          ROUND="${{ steps.config.outputs.round }}"
          git commit -m "[formula-e] Update round $ROUND ($(date -u +%Y-%m-%d))"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          bash .github/scripts/safe_push.sh
          echo "committed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: predict
    # Deploy only when new data was actually pushed (bot pushes don't retrigger
    # deploy-website.yml's push event — same pattern as the other crons).
    if: needs.predict.outputs.committed == 'true'
    uses: ./.github/workflows/deploy-website.yml
    permissions:
      contents: read
      pages: write
      id-token: write
