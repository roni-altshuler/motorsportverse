# MotorsportVerse workspace meta.
#
# This is a monorepo of independently-installable packages and projects. There is
# no single top-level Python package; install the members you need editable:
#
#   pip install -e "packages/motorsport-core[dev]"
#   pip install -e "packages/motorsport-data[dev]"
#   pip install -e projects/f2-predictions --no-deps
#
# The block below is recognised by uv as a workspace so `uv sync` installs all
# members together. Tooling defaults shared across members live here.

[tool.uv.workspace]
members = [
    "packages/motorsport-core",
    "packages/motorsport-data",
    "projects/*",
]

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["website", "templates"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501", "E741"]
