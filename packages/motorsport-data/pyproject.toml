[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "motorsport-data"
version = "0.1.0"
description = "Canonical schema, history store, and ingestion adapters for the MotorsportVerse ecosystem."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "MotorsportVerse" }]
keywords = ["motorsport", "data", "ingestion", "schema", "duckdb"]
dependencies = [
    "pydantic>=2.5",
]

[project.optional-dependencies]
store = ["duckdb>=0.10"]
ingest = ["requests>=2.31"]
dev = ["pytest>=7.4", "ruff>=0.4", "duckdb>=0.10"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
