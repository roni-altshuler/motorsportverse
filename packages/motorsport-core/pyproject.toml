[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "motorsport-core"
version = "0.1.0"
description = "Shared, sport-agnostic ML & evaluation infrastructure for the MotorsportVerse ecosystem."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "MotorsportVerse" }]
keywords = ["motorsport", "machine-learning", "calibration", "elo", "forecasting"]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "scipy>=1.11",
    "joblib>=1.3",
]

[project.optional-dependencies]
torch = ["torch>=2.0"]
dev = ["pytest>=7.4", "ruff>=0.4"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501", "E741"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
